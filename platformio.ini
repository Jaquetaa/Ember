; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitm-1] ; Selecionar o Ambiente (ESP)
platform = espressif32 ; Espressif32 (ESP)
board = esp32-s3-devkitm-1 ; Microcontrolador
framework = arduino ; Framework de Arduino

lib_deps = ; Bibliotecas Usadas
    SPI ; Protocolo Transceptor
    Wire ; Protocolo Câmera
    nrf24/RF24@^1.6.0 ; Biblioteca de Transceptor
    bodmer/TFT_eSPI@^2.5.43 ; Ecrã
lib_ldf_mode = deep+ ; Pesquisa agressiva de dependências nas Bibliotecas

extra_scripts = pre:scripts/patch_tft_espi_s3.py
; Corrige um bug conhecido da TFT_eSPI 2.5.43 no ESP32-S3 (SPI_PORT mal
; definido causa crash StoreProhibited em tft->init()). Corre antes de
; cada build para sobreviver a reinstalacoes da biblioteca. Ver o script
; para detalhes completos do bug.

monitor_speed = 115200 ; Baud Rate Serial Monitor
monitor_port = COM12 ; Porta COM12
upload_port = COM12 ; Porta COM12

build_flags = ; Flags de Compilação
  -DARDUINO_USB_CDC_ON_BOOT=0 ; Serial = UART0 (COM12 via chip USB-to-UART), nao USB CDC nativo
  -DCORE_DEBUG_LEVEL=3 ; Ver informação do ESP para Debugging

  ; Configuração TFT_eSPI para este projeto (ecrã ST7796S 480x320, ESP32-S3).
  ; USER_SETUP_LOADED ignora o User_Setup.h da biblioteca (que tinha pinos de
  ; ESP8266 por defeito, incompatíveis com este hardware, causando crash no
  ; tft->init() por escrever em pinos SPI errados).
  -DUSER_SETUP_LOADED=1
  -DST7796_DRIVER
  -DTFT_WIDTH=320
  -DTFT_HEIGHT=480
  -DTFT_MISO=16
  -DTFT_MOSI=47
  -DTFT_SCLK=48
  -DTFT_CS=41
  -DTFT_DC=21
  -DTFT_RST=42
  -DTFT_BL=45
  -DTFT_BACKLIGHT_ON=HIGH
  -DLOAD_GLCD
  -DLOAD_FONT2
  -DLOAD_FONT4
  -DLOAD_FONT6
  -DLOAD_FONT7
  -DLOAD_FONT8
  -DLOAD_GFXFF
  -DSMOOTH_FONT
  -DSPI_FREQUENCY=27000000
  -DSPI_READ_FREQUENCY=20000000

monitor_rts = 0 ; Para não dar RESET ao abrir o Serial Monitor
monitor_dtr = 0 ; Para não dar RESET ao abrir o Serial Monitor
monitor_filters = esp32_exception_decoder, default ; Mostra backtrace de excepcoes e output normal