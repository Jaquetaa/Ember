; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitm-1] ; Selecionar o Ambiente (ESP)
platform = espressif32 ; Espressif32 (ESP)
board = esp32-s3-devkitm-1 ; Microcontrolador
framework = arduino ; Framework de Arduino

lib_deps = ; Bibliotecas Usadas
    SPI ; Protocolo Transceptor
    Wire ; Protocolo Câmera
    nrf24/RF24@^1.6.0 ; Biblioteca de Transceptor
    bodmer/TFT_eSPI@^2.5.43 ; Ecrã
lib_ldf_mode = deep+ ; Pesquisa agressiva de dependências nas Bibliotecas

monitor_speed = 115200 ; Baud Rate Serial Monitor
monitor_port = COM12 ; Porta COM12
upload_port = COM12 ; Porta COM12

build_flags = ; Flags de Compilação
  -DARDUINO_USB_CDC_ON_BOOT=1 ; Ativa USB CDC, Necessário no ESP32-S3 para ler o Serial Monitor
  -DCORE_DEBUG_LEVEL=3 ; Ver informação do ESP para Debugging

monitor_rts = 0 ; Para não dar RESET ao abrir o Serial Monitor
monitor_dtr = 0 ; Para não dar RESET ao abrir o Serial Monitor
monitor_filters = default ; Filtros para o Serial Monitor